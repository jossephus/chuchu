on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (required for manual runs)"
        required: false
        type: string

name: Release

jobs:
  release:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix shell
        run: nix develop -L --verbose

      - name: parse version from tag
        id: version
        if: ${{ github.ref_type == 'tag' || inputs.release_tag != '' }}
        run: |
          set -e
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}"
          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not a valid semver (expected MAJOR.MINOR.PATCH, optionally prefixed with 'v')"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          for COMPONENT in "$MAJOR" "$MINOR" "$PATCH"; do
            if [ "$COMPONENT" -gt 99 ]; then
              echo "::error::Version component '$COMPONENT' exceeds 99 (MMmmpp scheme limit)"
              exit 1
            fi
          done
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Parsed version: $VERSION (major=$MAJOR minor=$MINOR patch=$PATCH)"

      - name: build chuchu_jni
        run: |
          nix develop -c bash -c '
            set -e
            cd zig-src
            zig build -Doptimize=ReleaseSmall jni 
          '

      - name: generate release key
        run: |
          cd android/app/ && echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > key.jks

      - name: build android release artifacts (APK + AAB)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_MAJOR: ${{ steps.version.outputs.major }}
          VERSION_MINOR: ${{ steps.version.outputs.minor }}
          VERSION_PATCH: ${{ steps.version.outputs.patch }}
        run: |
          nix develop -c bash -c '
            set -e
            cd android
            chmod +x ./gradlew
            if [ -f local.properties ]; then chmod -w local.properties; fi
            ./gradlew assembleRelease bundleRelease
          '

      - name: upload release
        if: ${{ github.ref_type == 'tag' || inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          draft: true
          files: |
            ./android/app/build/outputs/apk/release/*.apk
            ./android/app/build/outputs/bundle/release/*.aab
          fail_on_unmatched_files: true

